name: Deploy Hazard Risk Composer

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # --- DEV BUILD: from HEAD, served at /dev/ ---
      - name: Build (Dev)
        run: |
          npm install
          npx vite build --base=/Hazard-Risk-Composer/dev/

      - name: Save dev build
        run: cp -r dist dist-dev

      # --- Checkout latest release tag ---
      - name: Checkout latest release tag
        run: |
          LATEST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          git checkout $LATEST_TAG

      # --- PROD BUILD from latest tag, served at / ---
      - name: Build (Prod)
        run: |
          npm install
          npm run build

      # --- Stage everything ---
      - name: Prep staging folder
        run: |
          mkdir _site
          cp -r dist/* _site/
          mkdir -p _site/dev
          cp -r dist-dev/* _site/dev/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
